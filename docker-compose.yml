version: '3.8'

services:
  # Redis — handles rate limiting state
  redis:
    image: redis:7-alpine
    container_name: polyglot-redis
    ports:
      - "6379:6379"
    restart: always

  # Primary Express API backend
  api:
    build:
      context: .
      dockerfile: containers/api/Dockerfile
    container_name: polyglot-api
    ports:
      - "3000:3000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    # Load JWT_SECRET and any other secrets from the .env file
    env_file:
      - .env
    volumes:
      # CRITICAL: Docker socket lets the API spawn execution containers on the host daemon
      - /var/run/docker.sock:/var/run/docker.sock
      # Shared /tmp so temp code files written by the API are visible to spawned runners
      - /tmp:/tmp
    depends_on:
      - redis
    restart: always
